# Serena global config: disable tools that duplicate OpenCode’s built-in
# capabilities. Copied into `~/.serena/` on each sandbox entry (it needs to be
# writable).
gui_log_window: false
web_dashboard: false
web_dashboard_open_on_launch: false
projects: []
excluded_tools:
  # Redundant with OpenCode's built-in tools
  - read_file
  - create_text_file
  - list_dir
  - find_file
  - search_for_pattern
  - replace_content
  - execute_shell_command
  # Memory (no sandbox persistence for global memories)
  - write_memory
  - read_memory
  - list_memories
  - edit_memory
  - rename_memory
  - delete_memory
  # Management (not needed in sandbox)
  - initial_instructions
  - prepare_for_new_conversation
  - switch_modes
  - get_current_config
